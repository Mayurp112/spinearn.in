<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Blue accent gradient for logo badge -->
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Headline gradient -->
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <!-- Glow blur filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background glow orbs -->
  <circle cx="200" cy="150" r="300" fill="#1e40af" opacity="0.12"/>
  <circle cx="1050" cy="500" r="250" fill="#4f46e5" opacity="0.10"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Logo badge -->
  <rect x="80" y="72" width="56" height="56" rx="14" fill="url(#badge)"/>
  <text x="108" y="110" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">S</text>

  <!-- Brand name -->
  <text x="154" y="108" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="0.5">SpinAds</text>

  <!-- "Early access" pill -->
  <rect x="80" y="158" width="168" height="32" rx="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="100" cy="174" r="5" fill="#60a5fa"/>
  <text x="116" y="179" font-family="Arial, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Now in early access</text>

  <!-- Main headline -->
  <text font-family="Arial Black, sans-serif" font-size="80" font-weight="900" letter-spacing="-2">
    <tspan x="80" dy="300" fill="url(#headline)">Earn while your</tspan>
    <tspan x="80" dy="92" fill="url(#headline)">AI thinks.</tspan>
  </text>

  <!-- Subheading -->
  <text x="80" y="518" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8" font-weight="400">
    50% CPM revenue · passive · no code changes · Claude Code &amp; Codex
  </text>

  <!-- Right panel — terminal-style spinner preview -->
  <rect x="760" y="180" width="360" height="200" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Terminal dots -->
  <circle cx="790" cy="208" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="812" cy="208" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="834" cy="208" r="6" fill="#22c55e" opacity="0.7"/>
  <!-- Terminal text -->
  <text x="790" y="255" font-family="Courier New, monospace" font-size="13" fill="#64748b">Thinking...</text>
  <text x="790" y="285" font-family="Courier New, monospace" font-size="14" fill="#60a5fa">⟳ Try Warp Terminal →</text>
  <text x="790" y="315" font-family="Courier New, monospace" font-size="13" fill="#334155">_</text>

  <!-- Right stats cards -->
  <rect x="760" y="405" width="168" height="90" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="784" y="432" font-family="Arial, sans-serif" font-size="11" fill="#64748b" font-weight="600" letter-spacing="1">MONTHLY</text>
  <text x="784" y="465" font-family="Arial Black, sans-serif" font-size="28" fill="#93c5fd" font-weight="900">$27</text>
  <text x="784" y="485" font-family="Arial, sans-serif" font-size="11" fill="#475569">avg at 4h/day</text>

  <rect x="952" y="405" width="168" height="90" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="976" y="432" font-family="Arial, sans-serif" font-size="11" fill="#64748b" font-weight="600" letter-spacing="1">ANNUAL</text>
  <text x="976" y="465" font-family="Arial Black, sans-serif" font-size="28" fill="#4ade80" font-weight="900">$330</text>
  <text x="976" y="485" font-family="Arial, sans-serif" font-size="11" fill="#475569">at $5 CPM</text>

  <!-- Bottom URL -->
  <text x="80" y="590" font-family="Arial, sans-serif" font-size="15" fill="#334155">spinads.dev</text>
</svg>
